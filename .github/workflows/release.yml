name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cargo)
        if: '!matrix.cross'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          BIN="target/${{ matrix.target }}/release/x8"
          NAME="x8-${{ github.ref_name }}-${{ matrix.target }}"
          cp "$BIN" "dist/x8"
          chmod +x "dist/x8"
          tar -czf "dist/${NAME}.tar.gz" -C dist x8
          rm dist/x8
          shasum -a 256 "dist/${NAME}.tar.gz" | awk '{print $1}' > "dist/${NAME}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $bin = "target/${{ matrix.target }}/release/x8.exe"
          $name = "x8-${{ github.ref_name }}-${{ matrix.target }}"
          Copy-Item $bin "dist/x8.exe"
          Compress-Archive -Path "dist/x8.exe" -DestinationPath "dist/$name.zip"
          Remove-Item "dist/x8.exe"
          (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower() | Out-File -Encoding ascii "dist/$name.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: x8-${{ matrix.target }}
          path: dist/*

  release:
    name: github release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: list assets
        run: ls -la artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
